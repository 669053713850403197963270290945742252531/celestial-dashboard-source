{% extends "base.html" %}

{% block content %}

<body data-page="{{ page_title }}">

<div id="custom-confirm-container" class="fixed inset-0 flex items-center justify-center bg-black/50 backdrop-blur-sm hidden z-50">
  <div id="custom-confirm-box" class="bg-blue-900/20 border border-blue-700 rounded-2xl p-6 w-80 max-w-full text-center transform scale-90 opacity-0 transition-all duration-200">
    <p id="custom-confirm-message" class="text-[#64ffda] font-bold mb-4"></p>
    <div class="flex justify-center gap-4 flex-wrap">
      <button id="confirm-yes" class="glow-btn px-4 py-2 bg-green-600 hover:bg-green-500 text-white rounded-lg min-w-[80px]">Yes</button>
      <button id="confirm-no" class="glow-btn px-4 py-2 bg-red-600 hover:bg-red-500 text-white rounded-lg min-w-[80px]">No</button>
    </div>
  </div>
</div>

<div class="min-h-screen py-10 px-6 bg-transparent text-white">
  <div class="max-w-4xl mx-auto">
    <!-- Header -->
    <div class="text-center mb-10">
      <h1 class="text-4xl font-bold text-[#64ffda] glow-text mb-2">Hashing Utility</h1>
      <p class="text-gray-400 text-base">Convert text using multiple cryptographic algorithms</p>
    </div>

    <!-- Hashing Panel -->
    <div class="bg-blue-950/60 border border-blue-800 rounded-2xl glow-card p-6 transition-all duration-300 hover:scale-[1.02] hover:bg-blue-900/70">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 items-center mb-6">
        <!-- Dropdown -->
        <div>
          <label class="block text-gray-300 mb-2 font-medium">Select Algorithm</label>
          <select id="hashMethod" class="w-full bg-blue-900/50 border border-blue-700 text-white rounded-lg px-4 py-2 focus:ring-2 focus:ring-[#64ffda] focus:outline-none">
              <optgroup label="Utility">
                <option value="blank">Blank (No Hash)</option>
                <option value="identify">Identify Hash</option>
              </optgroup>

              <optgroup label="MD Family">
                <option value="md2">MD2</option>
                <option value="md4">MD4</option>
                <option value="md5">MD5</option>
              </optgroup>

              <optgroup label="SHA Family">
                <option value="sha1">SHA-1</option>
                <option value="sha224">SHA-224</option>
                <option value="sha256">SHA-256</option>
                <option value="sha384">SHA-384</option>
                <option value="sha512">SHA-512</option>
              </optgroup>

              <optgroup label="SHA3 Family">
                <option value="sha3_224">SHA3-224</option>
                <option value="sha3_256">SHA3-256</option>
                <option value="sha3_384">SHA3-384</option>
                <option value="sha3_512">SHA3-512</option>
              </optgroup>

              <optgroup label="Other Hashes">
                <option value="ripemd160">RIPEMD-160</option>
                <option value="blake2b">BLAKE2b</option>
                <option value="blake2s">BLAKE2s</option>
                <option value="whirlpool">Whirlpool</option>
                <option value="sm3">SM3</option>
              </optgroup>
          </select>
        </div>

        <!-- Button + Auto-hash -->
        <div class="flex items-center justify-end gap-4 mt-4 sm:mt-0">
          <label class="custom-checkbox text-gray-300 select-none">
            <input type="checkbox" id="autoHash">
            <span class="checkmark"></span>
            <span class="text-sm">Live Update</span>
          </label>
          <button id="generateBtn" class="bg-[#64ffda]/10 border border-[#64ffda]/50 text-[#64ffda] rounded-lg px-6 py-2 font-semibold hover:bg-[#64ffda]/20 transition-all duration-300 hover:scale-105">Generate Hash</button>

          <button id="historyBtn" class="bg-blue-800/40 border border-blue-700 text-[#64ffda] rounded-lg px-4 py-2 hover:bg-blue-800/70 transition-all duration-300 hover:scale-105">History</button>
        </div>
      </div>
        </div>
      </div>

      <!-- Input Text -->
      <div id="inputText-container" class="mb-6 max-w-2xl mx-auto">
        <label class="block text-gray-300 mb-2 font-medium">Input Text</label>
        <textarea id="inputText" class="w-full bg-blue-900/50 border border-blue-700 text-white rounded-lg px-4 py-3 resize-none h-28 focus:ring-2 focus:ring-[#64ffda] focus:outline-none" placeholder="Enter text to hash..."></textarea>
      </div>

      <!-- Output Text -->
      <div class="mb-3 max-w-2xl mx-auto">
        <label class="block text-gray-300 mb-2 font-medium">Output Hash</label>
        <textarea id="outputText" class="w-full bg-blue-900/50 border border-blue-700 text-green-400 rounded-lg px-4 py-3 resize-none h-28 focus:ring-2 focus:ring-green-400 focus:outline-none" readonly placeholder="Hash result will appear here..."></textarea>
        <div class="flex justify-end mt-2">
          <button id="copyBtn" class="copy-btn flex items-center gap-2 px-4 py-2 font-medium"><span>📋</span> Copy to Clipboard</button>
        </div>
      </div>
    </div>
  </div>
</div>


<!-- ===== History Modal ===== -->
<div id="historyModal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden items-center justify-center z-50">
  <div class="bg-blue-950/90 border border-[#64ffda]/40 rounded-2xl p-6 max-w-3xl w-[90%] shadow-lg glow-card relative">
    <h2 class="text-2xl text-[#64ffda] font-bold mb-4 glow-text">Hashing History</h2>

    <div class="overflow-y-auto max-h-[60vh]">
      <table class="w-full border-collapse">
        <thead>
          <tr class="bg-blue-900/60 border-b border-[#64ffda]/30">
            <th class="text-left p-3 text-[#64ffda]">Converted</th>
            <th class="text-left p-3 text-[#64ffda]">Hashed</th>
          </tr>
        </thead>
        <tbody id="historyTable" class="text-sm text-gray-300"></tbody>
      </table>
    </div>

    <div class="flex justify-between items-center mt-5">
      <button id="clearHistory" class="px-5 py-2 border border-red-400/50 rounded-lg text-red-400 hover:bg-red-500/10 transition-all">
        🧹 Clear History
      </button>

      <button id="closeHistory" class="px-5 py-2 border border-[#64ffda]/50 rounded-lg text-[#64ffda] hover:bg-[#64ffda]/10 transition-all">
        Close
      </button>
    </div>
  </div>
</div>

<style>
  .glow-card {
    box-shadow: 0 0 15px rgba(100, 255, 218, 0.1);
  }
  .glow-text {
    text-shadow: 0 0 10px rgba(100, 255, 218, 0.4);
  }
  .copy-btn {
    background: rgba(0, 255, 170, 0.08);
    border: 1px solid rgba(100, 255, 218, 0.4);
    color: #64ffda;
    border-radius: 0.5rem;
    transition: all 0.25s ease-in-out;
    box-shadow: 0 0 8px rgba(100, 255, 218, 0.15);
  }
  .copy-btn:hover {
    background: rgba(0, 255, 170, 0.15);
    box-shadow: 0 0 12px rgba(100, 255, 218, 0.35);
    transform: scale(1.05);
  }
  #historyModal {
    opacity: 0;
    transform: scale(0.97);
    transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out;
  }
  #historyModal.show {
    opacity: 1;
    transform: scale(1);
  }
  #historyModal.fade-out {
    opacity: 0;
    transform: scale(0.97);
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.97); }
    to { opacity: 1; transform: scale(1); }
  }
  #historyTable tr:hover {
    background-color: rgba(100, 255, 218, 0.08);
  }

  /* Add closing animation */
  @keyframes fadeOut {
    from { opacity: 1; transform: scale(1); }
    to { opacity: 0; transform: scale(0.97); }
  }
  .fade-out {
    animation: fadeOut 0.25s forwards;
  }
  /* Add some spacing between the panel and first textbox */
  #inputText-container {
    margin-top: 2rem; /* adjust as needed */
  }
</style>

<!-- CUSTOM CHECKBOX-->

<style>
  /* Custom Checkbox */
  .custom-checkbox {
    position: relative;
    display: inline-flex;
    align-items: center;
    cursor: pointer;
    user-select: none;
    gap: 0.5rem;
  }

  .custom-checkbox input[type="checkbox"] {
    position: absolute;
    opacity: 0;
    cursor: pointer;
    height: 0;
    width: 0;
  }

  .custom-checkbox span.checkmark {
    width: 20px;
    height: 20px;
    background: rgba(0, 255, 170, 0.1);
    border: 2px solid #64ffda;
    border-radius: 0.375rem; /* rounded-lg */
    display: inline-block;
    transition: all 0.2s ease-in-out;
    box-shadow: 0 0 5px rgba(100, 255, 218, 0.2);
    position: relative;
  }

  .custom-checkbox input:checked + .checkmark {
    background: #64ffda;
    box-shadow: 0 0 8px #64ffda;
    border-color: #64ffda;
  }

  .custom-checkbox .checkmark::after {
    content: "";
    position: absolute;
    display: none;
  }

  .custom-checkbox input:checked + .checkmark::after {
    display: block;
    left: 5px;
    top: 1px;
    width: 6px;
    height: 12px;
    border: solid white;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }
</style>

<!-- ===== Scripts ===== -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jssha@3.3.1/dist/sha.js"></script>
<script src="https://cdn.jsdelivr.net/npm/js-md2@0.1.2/build/md2.min.js"></script> <!-- optional if you want MD2 -->
<script src="https://cdn.jsdelivr.net/npm/js-md4@0.3.2/build/md4.min.js"></script> <!-- optional if you want MD4 -->
<script src="https://cdn.jsdelivr.net/npm/hash-wasm@4"></script>

<script type="module">
import { createToast, createDialog } from '/resources/scripts/ui-notifs.js';

// Expose globally for non-module scripts
window.createToast = createToast;
window.createDialog = createDialog;

  function getCookie(name) {
    const value = `; ${document.cookie}`;
    const parts = value.split(`; ${name}=`);
    if (parts.length === 2) return parts.pop().split(';').shift();
    return '';
  }

  function setCookie(name, value) {
    document.cookie = `${name}=${encodeURIComponent(value)}; path=/;`;
  }

  function appendHistory(input, hash) {
    if (!input || !hash || hash.startsWith("❌")) return;

    const prev = decodeURIComponent(getCookie("hash-hist") || "");
    const entries = prev ? prev.split("\n") : [];

    const newEntry = `${input}: ${hash}`;

    // Prevent duplicates
    if (!entries.includes(newEntry)) {
      entries.push(newEntry);
      setCookie("hash-hist", entries.join("\n"));
    }
  }

  // ==== HASH GENERATION ====
  async function generateHash() {
    const input = document.getElementById("inputText").value.trim();
    const method = document.getElementById("hashMethod").value;
    const outputBox = document.getElementById("outputText");
    let hash = "";

    if (!input && method !== "identify") {
      outputBox.value = "⚠️ Please enter text to hash.";
      return;
    }

    switch (method) {
      case "md2": hash = md2(input); break;
      case "md4": hash = md4(input); break;
      case "md5": hash = CryptoJS.MD5(input).toString(); break;
      case "sha1": hash = CryptoJS.SHA1(input).toString(); break;
      case "sha224": hash = CryptoJS.SHA224(input).toString(); break;
      case "sha256": hash = CryptoJS.SHA256(input).toString(); break;
      case "sha384": hash = CryptoJS.SHA384(input).toString(); break;
      case "sha512": hash = CryptoJS.SHA512(input).toString(); break;
      case "sha3_224": hash = new jsSHA("SHA3-224","TEXT").update(input).getHash("HEX"); break;
      case "sha3_256": hash = new jsSHA("SHA3-256","TEXT").update(input).getHash("HEX"); break;
      case "sha3_384": hash = new jsSHA("SHA3-384","TEXT").update(input).getHash("HEX"); break;
      case "sha3_512": hash = new jsSHA("SHA3-512","TEXT").update(input).getHash("HEX"); break;
      case "ripemd160": hash = await hashwasm.ripemd160(input); break;

      // Other hashes
      case "blake2b": hash = await hashwasm.blake2b(input); break;
      case "blake2s": hash = await hashwasm.blake2s(input); break;
      case "whirlpool": hash = await hashwasm.whirlpool(input); break;
      case "sm3": hash = await hashwasm.sm3(input); break;
      case "identify":
        const h = input.trim();
        if(!/^[0-9a-fA-F]+$/.test(h)) hash = "❌ Not a hex hash";
        else switch(h.length){
          case 32: hash = "Likely: MD5"; break;
          case 40: hash = "Likely: SHA-1, RIPEMD-160"; break;
          case 56: hash = "Likely: SHA-224"; break;
          case 64: hash = "Likely: SHA-256, SHA3-256"; break;
          case 96: hash = "Likely: SHA-384, SHA3-384"; break;
          case 128: hash = "Likely: SHA-512, SHA3-512, Whirlpool"; break;
          case 256: hash = "Likely: SHAKE-128/256, BLAKE2b"; break;
          case 64: hash = "Likely: BLAKE2s"; break; // BLAKE2s is 32 bytes = 64 hex
          default: hash = "❓ Unknown hash";
        }
        break;
      default:
        hash = "❌ Unsupported algorithm.";
    }

    outputBox.value = hash;
    appendHistory(input, hash);
  }

  // === EVENT HANDLERS ===
  document.getElementById("generateBtn").addEventListener("click", generateHash);

  document.getElementById("inputText").addEventListener("input", () => {
    if (document.getElementById("autoHash").checked) generateHash();
  });
  document.getElementById("hashMethod").addEventListener("change", () => {
    if (document.getElementById("autoHash").checked) generateHash();
  });

  // Copy to Clipboard
  document.getElementById("copyBtn").addEventListener("click", () => {
    const output = document.getElementById("outputText").value;
    if (!output) return;
    navigator.clipboard.writeText(output);
    const btn = document.getElementById("copyBtn");
    btn.textContent = "✅ Copied!";
    setTimeout(() => btn.textContent = "📋 Copy to Clipboard", 1500);
  });

  // === CLEAR HISTORY ===
  document.getElementById("clearHistory").addEventListener("click", async () => {
    const historyModal = document.getElementById("historyModal");

    // Animate history modal out
    historyModal.classList.remove("show");
    historyModal.classList.add("fade-out");
    await new Promise(res => setTimeout(res, 300));
    historyModal.classList.add("hidden");
    historyModal.classList.remove("fade-out", "flex");

    // Show confirm prompt
    const result = await createDialog("Are you sure you want to clear history?");
    
    if (result) {
      setCookie("hash-hist", "", -1);
      const tableBody = document.getElementById("historyTable");
      tableBody.innerHTML = '<tr><td colspan="2" class="p-3 text-gray-500 text-center">No history available</td></tr>';
      createToast("History cleared!", "success");
    } else {
      createToast("History not cleared.", "info");
    }

    // Animate history modal back in
    historyModal.classList.remove("hidden");
    historyModal.classList.add("flex");
    requestAnimationFrame(() => historyModal.classList.add("show"));
  });

  // === OPEN HISTORY MODAL ===
  const modal = document.getElementById("historyModal");
  document.getElementById("historyBtn").addEventListener("click", () => {
    const tableBody = document.getElementById("historyTable");
    tableBody.innerHTML = "";
    const data = decodeURIComponent(getCookie("hash-hist") || "");
    if (!data) {
      tableBody.innerHTML = '<tr><td colspan="2" class="p-3 text-gray-500 text-center">No history available</td></tr>';
    } else {
      data.split("\n").forEach(line => {
        const [input, hash] = line.split(": ");
        if (input && hash) {
          const row = document.createElement("tr");
          row.innerHTML = `<td class="p-3 border-b border-blue-800/50 text-white">${input}</td>
                          <td class="p-3 border-b border-blue-800/50 text-green-400">${hash}</td>`;
          tableBody.appendChild(row);
        }
      });
    }

    modal.classList.remove("hidden", "fade-out");
    modal.classList.add("flex");  // <-- ensure flex is applied for centering
    requestAnimationFrame(() => modal.classList.add("show")); // animate open
  });

  // === CLOSE MODAL ===
  document.getElementById("closeHistory").addEventListener("click", () => {
    modal.classList.remove("show");
    modal.classList.add("fade-out");
    setTimeout(() => {
      modal.classList.add("hidden");
      modal.classList.remove("fade-out", "flex");
    }, 300);
  });
</script>
{% endblock %}
