{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="/resources/styles/hashing.css">

<div class="min-h-screen py-6 px-4 sm:py-10 sm:px-6 bg-transparent text-white">
  <div class="max-w-4xl mx-auto">

    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-2xl sm:text-4xl font-bold text-[#64ffda] glow-text mb-2">Hashing Utility</h1>
      <p class="text-gray-400 text-sm">Convert text using multiple cryptographic algorithms</p>
    </div>

    <!-- Main Card -->
    <div class="bg-blue-950/60 border border-blue-800 rounded-2xl glow-card p-4 sm:p-6 transition-all duration-300">

      <!-- Algorithm + Controls Row -->
      <div class="flex flex-col sm:flex-row sm:items-end gap-4 mb-6">

        <!-- Dropdown -->
        <div class="flex-1">
          <label class="block text-gray-300 mb-2 font-medium">Select Algorithm</label>
          <select id="hashMethod" class="w-full bg-blue-900/50 border border-blue-700 text-white rounded-lg px-4 py-2 focus:ring-2 focus:ring-[#64ffda] focus:outline-none">
            <optgroup label="Utility">
              <option value="blank">Blank (No Hash)</option>
              <option value="identify">Identify Hash</option>
            </optgroup>
            <optgroup label="MD Family">
              <option value="md2">MD2</option>
              <option value="md4">MD4</option>
              <option value="md5">MD5</option>
            </optgroup>
            <optgroup label="SHA Family">
              <option value="sha1">SHA-1</option>
              <option value="sha224">SHA-224</option>
              <option value="sha256">SHA-256</option>
              <option value="sha384">SHA-384</option>
              <option value="sha512">SHA-512</option>
            </optgroup>
            <optgroup label="SHA3 Family">
              <option value="sha3_224">SHA3-224</option>
              <option value="sha3_256">SHA3-256</option>
              <option value="sha3_384">SHA3-384</option>
              <option value="sha3_512">SHA3-512</option>
            </optgroup>
            <optgroup label="Other Hashes">
              <option value="ripemd160">RIPEMD-160</option>
              <option value="blake2b">BLAKE2b</option>
              <option value="blake2s">BLAKE2s</option>
              <option value="whirlpool">Whirlpool</option>
              <option value="sm3">SM3</option>
            </optgroup>
          </select>
        </div>

        <!-- Buttons + Checkbox -->
        <div class="flex flex-wrap items-center gap-2 sm:gap-3">
          <label class="custom-checkbox text-gray-300 select-none">
            <input type="checkbox" id="autoHash">
            <span class="checkmark"></span>
            <span class="text-sm">Live Update</span>
          </label>
          <button id="generateBtn"
            class="flex-1 sm:flex-none bg-[#64ffda]/10 border border-[#64ffda]/50 text-[#64ffda] rounded-lg px-4 py-2 font-semibold hover:bg-[#64ffda]/20 transition-all duration-300 hover:scale-105">
            Generate Hash
          </button>
          <button id="historyBtn"
            class="flex-1 sm:flex-none bg-blue-800/40 border border-blue-700 text-[#64ffda] rounded-lg px-4 py-2 hover:bg-blue-800/70 transition-all duration-300 hover:scale-105">
            History
          </button>
        </div>
      </div>

      <!-- Input -->
      <div class="mb-4">
        <label class="block text-gray-300 mb-2 font-medium">Input Text</label>
        <textarea id="inputText"
          class="w-full bg-blue-900/50 border border-blue-700 text-white rounded-lg px-4 py-3 resize-none h-28 focus:ring-2 focus:ring-[#64ffda] focus:outline-none"
          placeholder="Enter text to hash..."></textarea>
      </div>

      <!-- Output -->
      <div class="mb-2">
        <label class="block text-gray-300 mb-2 font-medium">Output Hash</label>
        <textarea id="outputText"
          class="w-full bg-blue-900/50 border border-blue-700 text-green-400 rounded-lg px-4 py-3 resize-none h-28 focus:ring-2 focus:ring-green-400 focus:outline-none"
          readonly placeholder="Hash result will appear here..."></textarea>
        <div class="flex justify-end mt-2">
          <button id="copyBtn" class="copy-btn flex items-center gap-2 px-4 py-2 font-medium">
            <span>📋</span> Copy to Clipboard
          </button>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- History Modal -->
<div id="historyModal"
  class="fixed inset-0 bg-black/80 backdrop-blur-md hidden items-center justify-center z-50 p-4">
  <div class="bg-blue-950/90 border border-[#64ffda]/40 rounded-2xl p-4 sm:p-6 w-full max-w-3xl shadow-lg glow-card relative">
    <h2 class="text-xl sm:text-2xl text-[#64ffda] font-bold mb-4 glow-text">Hashing History</h2>

    <div class="overflow-x-auto overflow-y-auto max-h-[50vh]">
      <table class="w-full border-collapse min-w-[400px]">
        <thead>
          <tr class="bg-blue-900/60 border-b border-[#64ffda]/30">
            <th class="text-left p-3 text-[#64ffda] w-1/2">Input</th>
            <th class="text-left p-3 text-[#64ffda] w-1/2">Hash</th>
          </tr>
        </thead>
        <tbody id="historyTable" class="text-sm text-gray-300"></tbody>
      </table>
    </div>

    <div class="flex flex-col sm:flex-row justify-between items-stretch sm:items-center gap-2 mt-5">
      <button id="clearHistory"
        class="px-5 py-2 border border-red-400/50 rounded-lg text-red-400 hover:bg-red-500/10 transition-all text-center">
        🧹 Clear History
      </button>
      <button id="closeHistory"
        class="px-5 py-2 border border-[#64ffda]/50 rounded-lg text-[#64ffda] hover:bg-[#64ffda]/10 transition-all text-center">
        Close
      </button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jssha@3.3.1/dist/sha.js"></script>
<script src="https://cdn.jsdelivr.net/npm/js-md2@0.1.2/build/md2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/js-md4@0.3.2/build/md4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hash-wasm@4"></script>

<script type="module">
import { createToast, createDialog } from '/resources/scripts/ui-notifs.js';
window.createToast = createToast;
window.createDialog = createDialog;

function getCookie(name) {
  const value = `; ${document.cookie}`;
  const parts = value.split(`; ${name}=`);
  if (parts.length === 2) return parts.pop().split(';').shift();
  return '';
}

function setCookie(name, value, days) {
  const expires = days < 0 ? 'expires=Thu, 01 Jan 1970 00:00:00 UTC;' : '';
  document.cookie = `${name}=${encodeURIComponent(value)}; path=/; ${expires}`;
}

function appendHistory(input, hash) {
  if (!input || !hash || hash.startsWith("❌") || hash.startsWith("⚠️")) return;
  const prev = decodeURIComponent(getCookie("hash-hist") || "");
  const entries = prev ? prev.split("\n") : [];
  const newEntry = `${input}: ${hash}`;
  if (!entries.includes(newEntry)) {
    entries.push(newEntry);
    setCookie("hash-hist", entries.join("\n"));
  }
}

async function generateHash() {
  const input = document.getElementById("inputText").value.trim();
  const method = document.getElementById("hashMethod").value;
  const outputBox = document.getElementById("outputText");
  let hash = "";

  if (!input && method !== "identify") {
    outputBox.value = "⚠️ Please enter text to hash.";
    return;
  }

  switch (method) {
    case "md2":       hash = md2(input); break;
    case "md4":       hash = md4(input); break;
    case "md5":       hash = CryptoJS.MD5(input).toString(); break;
    case "sha1":      hash = CryptoJS.SHA1(input).toString(); break;
    case "sha224":    hash = CryptoJS.SHA224(input).toString(); break;
    case "sha256":    hash = CryptoJS.SHA256(input).toString(); break;
    case "sha384":    hash = CryptoJS.SHA384(input).toString(); break;
    case "sha512":    hash = CryptoJS.SHA512(input).toString(); break;
    case "sha3_224":  hash = new jsSHA("SHA3-224","TEXT").update(input).getHash("HEX"); break;
    case "sha3_256":  hash = new jsSHA("SHA3-256","TEXT").update(input).getHash("HEX"); break;
    case "sha3_384":  hash = new jsSHA("SHA3-384","TEXT").update(input).getHash("HEX"); break;
    case "sha3_512":  hash = new jsSHA("SHA3-512","TEXT").update(input).getHash("HEX"); break;
    case "ripemd160": hash = await hashwasm.ripemd160(input); break;
    case "blake2b":   hash = await hashwasm.blake2b(input); break;
    case "blake2s":   hash = await hashwasm.blake2s(input); break;
    case "whirlpool": hash = await hashwasm.whirlpool(input); break;
    case "sm3":       hash = await hashwasm.sm3(input); break;
    case "blank":     hash = input; break;
    case "identify": {
      const h = input.trim();
      if (!/^[0-9a-fA-F]+$/.test(h)) { hash = "❌ Not a hex hash"; break; }
      switch (h.length) {
        case 32:  hash = "Likely: MD5"; break;
        case 40:  hash = "Likely: SHA-1 or RIPEMD-160"; break;
        case 56:  hash = "Likely: SHA-224"; break;
        case 64:  hash = "Likely: SHA-256, SHA3-256, or BLAKE2s"; break;
        case 96:  hash = "Likely: SHA-384 or SHA3-384"; break;
        case 128: hash = "Likely: SHA-512, SHA3-512, or Whirlpool"; break;
        default:  hash = "❓ Unknown hash length";
      }
      break;
    }
    default: hash = "❌ Unsupported algorithm.";
  }

  outputBox.value = hash;
  appendHistory(input, hash);
}

document.getElementById("generateBtn").addEventListener("click", generateHash);
document.getElementById("inputText").addEventListener("input", () => {
  if (document.getElementById("autoHash").checked) generateHash();
});
document.getElementById("hashMethod").addEventListener("change", () => {
  if (document.getElementById("autoHash").checked) generateHash();
});

document.getElementById("copyBtn").addEventListener("click", () => {
  const output = document.getElementById("outputText").value;
  if (!output) return;
  navigator.clipboard.writeText(output);
  const btn = document.getElementById("copyBtn");
  btn.innerHTML = "✅ Copied!";
  setTimeout(() => { btn.innerHTML = '<span>📋</span> Copy to Clipboard'; }, 1500);
});

const modal = document.getElementById("historyModal");

document.getElementById("historyBtn").addEventListener("click", () => {
  const tableBody = document.getElementById("historyTable");
  tableBody.innerHTML = "";
  const data = decodeURIComponent(getCookie("hash-hist") || "");
  if (!data) {
    tableBody.innerHTML = '<tr><td colspan="2" class="p-3 text-gray-500 text-center">No history available</td></tr>';
  } else {
    data.split("\n").forEach(line => {
      const idx = line.indexOf(": ");
      if (idx === -1) return;
      const input = line.slice(0, idx);
      const hash  = line.slice(idx + 2);
      const row = document.createElement("tr");
      row.innerHTML = `
        <td class="p-3 border-b border-blue-800/50 text-white break-all">${input}</td>
        <td class="p-3 border-b border-blue-800/50 text-green-400 break-all">${hash}</td>`;
      tableBody.appendChild(row);
    });
  }
  modal.classList.remove("hidden", "fade-out");
  modal.classList.add("flex");
  requestAnimationFrame(() => modal.classList.add("show"));
});

document.getElementById("closeHistory").addEventListener("click", () => {
  modal.classList.remove("show");
  modal.classList.add("fade-out");
  setTimeout(() => {
    modal.classList.add("hidden");
    modal.classList.remove("fade-out", "flex");
  }, 300);
});

document.getElementById("clearHistory").addEventListener("click", async () => {
  modal.classList.remove("show");
  modal.classList.add("fade-out");
  await new Promise(res => setTimeout(res, 300));
  modal.classList.add("hidden");
  modal.classList.remove("fade-out", "flex");

  const result = await createDialog("Are you sure you want to clear history?");

  if (result) {
    setCookie("hash-hist", "", -1);
    document.getElementById("historyTable").innerHTML =
      '<tr><td colspan="2" class="p-3 text-gray-500 text-center">No history available</td></tr>';
    createToast("History cleared!", "success");
  } else {
    createToast("History not cleared.", "info");
  }

  modal.classList.remove("hidden");
  modal.classList.add("flex");
  requestAnimationFrame(() => modal.classList.add("show"));
});
</script>
{% endblock %}
