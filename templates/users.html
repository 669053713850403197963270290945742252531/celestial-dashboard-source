{% extends "base.html" %}

{% block content %}

<link rel="stylesheet" href="/resources/styles/users.css">
<body data-page="{{ page_title }}">

<div id="custom-confirm-container" class="fixed inset-0 flex items-center justify-center bg-black/50 backdrop-blur-sm hidden z-50">
  <div id="custom-confirm-box" class="bg-blue-900/20 border border-blue-700 rounded-2xl p-6 w-80 max-w-full text-center transform scale-90 opacity-0 transition-all duration-200">
    <p id="custom-confirm-message" class="text-[#64ffda] font-bold mb-4"></p>
    <div class="flex justify-center gap-4 flex-wrap">
      <button id="confirm-yes" class="glow-btn px-4 py-2 bg-green-600 hover:bg-green-500 text-white rounded-lg min-w-[80px]">Yes</button>
      <button id="confirm-no" class="glow-btn px-4 py-2 bg-red-600 hover:bg-red-500 text-white rounded-lg min-w-[80px]">No</button>
    </div>
  </div>
</div>

<div id="notification-container" class="fixed top-4 right-4 flex flex-col space-y-2 z-50 pointer-events-none max-w-xs"></div>

<!-- Header -->
<div class="flex justify-center mb-6">
  <h2 class="text-3xl font-bold text-[#64ffda] tracking-wide">User Management</h2>
</div>

<!-- Search + Filter + Add Button -->
<div class="mb-4 flex flex-col sm:flex-row sm:items-center sm:justify-start gap-2 w-full max-w-[800px] mx-auto">
  <input type="text" id="searchInput" placeholder="Search..." 
         class="flex-1 p-3 rounded-lg bg-blue-950/30 border border-blue-700 text-white focus:outline-none focus:ring-2 focus:ring-[#64ffda] transition">
  <select id="filterSelect" class="p-3 rounded-lg bg-blue-950/30 border border-blue-700 text-white focus:outline-none focus:ring-2 focus:ring-[#64ffda] transition">
    <option value="Identifier">Identifier</option>
    <option value="HWID">HWID</option>
    <option value="Rank">Rank</option>
    <option value="DiscordId">Discord ID</option>
    <option value="JoinDate">Join Date</option>
  </select>
  <button onclick="openAddModal()" class="glow-btn px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-500 text-white shadow-lg transition">
    + Add User
  </button>
  <button id="saveBtn" onclick="saveChanges()" disabled
    class="glow-btn px-4 py-2 rounded-lg bg-gray-600 text-white shadow-lg transition opacity-50 cursor-not-allowed"
    style="transition: all 0.3s ease;">
    Save Changes
  </button>
</div>

<!-- Whitelist Table -->
<div class="table-container w-full max-w-800 ml-auto">
  <div class="bg-blue-900/20 border border-blue-700 shadow-xl rounded-2xl overflow-x-auto p-4 sm:p-6">
    <table id="whitelistTable" class="w-full text-left border-collapse table-fixed">
      <thead class="bg-blue-800/60 hidden sm:table-header-group">
        <tr>
          <th class="p-3 text-[#64ffda]">Identifier</th>
          <th class="p-3 text-[#64ffda]">HWID</th>
          <th class="p-3 text-[#64ffda]">Discord ID</th>
          <th class="p-3 text-[#64ffda]">Rank</th>
          <th class="p-3 text-[#64ffda]">Join Date</th>
          <th class="p-3 text-[#64ffda]">Key</th>
          <th class="p-3 text-[#64ffda]">Notes</th>
          <th class="p-3 text-[#64ffda]">Actions</th>
        </tr>
      </thead>
      <tbody id="whitelistBody">
        <!-- Dynamic rows -->
      </tbody>
    </table>
  </div>
</div>

<!-- Pagination -->
<div id="pagination" class="flex flex-wrap justify-end mt-4 gap-2"></div>

<!-- Add/Edit Modal -->
<div id="userModal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/50 backdrop-blur-md p-0 sm:p-4">
  <div id="modalContent" class="relative bg-blue-900/20 border border-blue-700 shadow-xl rounded-2xl w-full max-w-md p-4 sm:p-6 transform scale-90 opacity-0 transition-all duration-300">

    <h3 id="modalTitle" class="text-xl font-bold mb-4 text-[#64ffda] tracking-wide">Add User</h3>
    
    <div id="formErrors" class="mb-2 text-red-400 text-sm hidden"></div>

    <form id="userForm" autocomplete="off" class="space-y-4">
      <div class="input-group">
        <input type="text" name="Identifier" placeholder="Identifier" required>
        <label>Identifier</label>
      </div>
      <div class="input-group">
        <input type="text" name="HWID" placeholder="HWID" required>
        <label>HWID</label>
      </div>
      <div class="input-group">
        <input type="text" name="DiscordId" placeholder="Discord ID" required>
        <label>Discord ID</label>
      </div>
      <div class="input-group">
        <select id="addUserRankDropdown" name="Rank" required>
          <option value="" disabled selected>Select Rank</option>
          <option value="User">User</option>
          <option value="Moderator">Moderator</option>
          <option value="Admin">Admin</option>
          <option value="Owner">Owner</option>
        </select>
        <label>Rank</label>
      </div>
      <div class="input-group">
        <input type="text" name="Notes" placeholder="Notes (optional)">
        <label>Notes</label>
      </div>

      <div class="flex flex-col sm:flex-row justify-end space-y-2 sm:space-y-0 sm:space-x-2 mt-2">
        <button type="button" class="glow-btn bg-gray-600 hover:bg-gray-500 px-4 py-2 rounded-lg transition min-w-[80px]" id="cancelBtnBottom">Cancel</button>
        <button type="submit" class="glow-btn bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg transition min-w-[80px]">Save</button>
      </div>
    </form>
  </div>
</div>


<script type="module">
import { createToast, createDialog } from '/resources/scripts/ui-notifs.js';

window.createToast = createToast;
window.createDialog = createDialog;

const modal = document.getElementById('userModal');
const modalContent = document.getElementById('modalContent');
const cancelBtnBottom = document.getElementById('cancelBtnBottom');
const form = document.getElementById('userForm');
const saveBtn = document.getElementById('saveBtn');

let users = [];          // source of truth from server
let stagedUsers = [];    // local working copy
let pendingChanges = {   // tracks what's dirty
  added: [],
  edited: {},            // keyed by original Identifier
  removed: [],
  rerolled: []
};
let currentPage = 1;
const rowsPerPage = 10;

// ── Dirty state helpers ──────────────────────────────────────────────────────

function isDirty() {
  return (
    pendingChanges.added.length > 0 ||
    Object.keys(pendingChanges.edited).length > 0 ||
    pendingChanges.removed.length > 0 ||
    pendingChanges.rerolled.length > 0
  );
}

function markDirty() {
  window.__hasPendingChanges = true;  // ← add
  saveBtn.disabled = false;
  saveBtn.classList.remove('opacity-50', 'cursor-not-allowed', 'bg-gray-600');
  saveBtn.classList.add('bg-green-600', 'hover:bg-green-500');
  applyButtonGlows();
}

function clearDirty() {
  window.__hasPendingChanges = false;  // ← add
  pendingChanges = { added: [], edited: {}, removed: [], rerolled: [] };
  saveBtn.disabled = true;
  saveBtn.classList.add('opacity-50', 'cursor-not-allowed', 'bg-gray-600');
  saveBtn.classList.remove('bg-green-600', 'hover:bg-green-500');
  applyButtonGlows();
}

// ── Fetch (source of truth) ──────────────────────────────────────────────────

async function fetchUsers() {
  try {
    const res = await fetch("/api/whitelist");
    const data = await res.json();
    if (data.success) {
      users = data.users;
      stagedUsers = structuredClone(users);
      clearDirty();
      renderTable();
    } else {
      createToast("Failed to fetch whitelist: " + data.error, "error");
    }
  } catch (e) {
    console.error(e);
    createToast("Error fetching whitelist", "error");
  }
}

// ── Save all pending changes ─────────────────────────────────────────────────

window.saveChanges = async function () {
  if (!isDirty()) return;

  try {
    const res = await fetch("/api/save_all", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ users: stagedUsers })
    });
    const data = await res.json();
    if (data.success) {
      createToast("Changes saved and committed!", "success");
      await fetchUsers(); // re-sync from server, clears dirty state
    } else {
      createToast("Save failed: " + data.error, "error");
    }
  } catch (err) {
    console.error(err);
    createToast("Error saving changes", "error");
  }
};

// ── Modal helpers (unchanged) ────────────────────────────────────────────────

function openModal(title) {
  document.getElementById("modalTitle").innerText = title;
  modal.classList.remove("hidden");
  document.querySelectorAll(".glow-btn .ripple").forEach(r => r.remove());
  void modalContent.offsetWidth;
  modalContent.classList.remove("modal-close");
  modalContent.classList.add("modal-open");
}

function closeModal() {
  modalContent.classList.remove("modal-open");
  modalContent.classList.add("modal-close");
  modalContent.addEventListener("animationend", () => {
    modal.classList.add("hidden");
  }, { once: true });
}

function openAddModal() {
  form.reset();
  form.dataset.editIdentifier = "";
  const settingsMatch = document.cookie.match(/celestial_settings=([^;]+)/);
  let defaultRank = "User";
  if (settingsMatch) {
    try {
      const settings = JSON.parse(decodeURIComponent(settingsMatch[1]));
      if (settings.defaultRank) defaultRank = settings.defaultRank;
    } catch {}
  }
  const rankDropdown = document.getElementById("addUserRankDropdown");
  if (rankDropdown) rankDropdown.value = defaultRank;
  openModal("Add User");
}
window.openAddModal = openAddModal;

function editUserObj(u) {
  form.Identifier.value = u.Identifier;
  form.HWID.value = u.HWID;
  form.DiscordId.value = u.DiscordId;
  form.Rank.value = u.Rank;
  form.Notes.value = u.Notes || "";
  form.dataset.editIdentifier = u.Identifier;
  openModal("Edit User");
}

cancelBtnBottom.addEventListener('click', closeModal);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

let isSelectingText = false;
modalContent.addEventListener('mousedown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') isSelectingText = true;
});
document.addEventListener('mouseup', () => { isSelectingText = false; });
modal.addEventListener('click', e => {
  if (e.target === modal && !modal.contains(document.activeElement)) closeModal();
});

// ── Form submit → stage locally ──────────────────────────────────────────────

form.addEventListener('submit', e => {
  e.preventDefault();
  const isEditing = !!form.dataset.editIdentifier;
  const originalId = form.dataset.editIdentifier;
  const existing = isEditing ? stagedUsers.find(u => u.Identifier === originalId) : null;

  const newUser = {
    Identifier: form.Identifier.value.trim(),
    HWID: form.HWID.value.trim(),
    DiscordId: form.DiscordId.value.trim(),
    Rank: form.Rank.value,
    JoinDate: isEditing ? (existing?.JoinDate || new Date().toLocaleString()) : new Date().toLocaleString(),
    Key: isEditing ? (existing?.Key || "") : "",
    Notes: form.Notes.value.trim() || null
  };

  // Validation
  let hasError = false;
  if (newUser.Identifier.length < 3 || newUser.Identifier.length > 20) {
    createToast("Identifier must be 3-20 characters", "error"); hasError = true;
  }
  if (newUser.HWID.length !== 64) {
    createToast("HWID must be 64 characters (SHA-256)", "error"); hasError = true;
  }
  if (!/^\d{17,20}$/.test(newUser.DiscordId)) {
    createToast("Discord ID must be 17-20 digits", "error"); hasError = true;
  }

  const others = isEditing
    ? stagedUsers.filter(u => u.Identifier !== originalId)
    : stagedUsers;

  if (others.some(u => u.Identifier === newUser.Identifier)) {
    createToast("Identifier already exists", "error"); hasError = true;
  }
  if (others.some(u => u.HWID === newUser.HWID)) {
    createToast("HWID already exists", "error"); hasError = true;
  }
  if (others.some(u => u.DiscordId === newUser.DiscordId)) {
    createToast("Discord ID already exists", "error"); hasError = true;
  }
  if (hasError) return;

  if (isEditing) {
    const idx = stagedUsers.findIndex(u => u.Identifier === originalId);
    if (idx !== -1) stagedUsers[idx] = newUser;
    pendingChanges.edited[originalId] = newUser;
    createToast("Edit staged — click Save to commit", "success");
  } else {
    stagedUsers.push(newUser);
    pendingChanges.added.push(newUser);
    createToast("User staged — click Save to commit", "success");
  }

  markDirty();
  renderTable();
  closeModal();
});

// ── Remove → stage locally ───────────────────────────────────────────────────

async function removeUserObj(u) {
  const confirmed = await createDialog(`Stage removal of ${u.Identifier}?`);
  if (!confirmed) return;

  stagedUsers = stagedUsers.filter(x => x.Identifier !== u.Identifier);
  pendingChanges.removed.push(u.Identifier);
  // If it was a staged-add that hasn't been saved yet, just cancel it out
  pendingChanges.added = pendingChanges.added.filter(x => x.Identifier !== u.Identifier);

  markDirty();
  renderTable();
  createToast(`${u.Identifier} removal staged — click Save to commit`, "error");
}

// ── Reroll key → stage locally ───────────────────────────────────────────────

async function rerollUserKey(identifier) {
  const confirmed = await createDialog(`Stage key reroll for ${identifier}?`);
  if (!confirmed) return;

  // Generate a new key client-side (or just flag it — server generates on save)
  const idx = stagedUsers.findIndex(u => u.Identifier === identifier);
  if (idx !== -1) {
    // Mark as pending reroll; actual generation happens server-side on /api/save_all
    stagedUsers[idx]._pendingReroll = true;
    if (!pendingChanges.rerolled.includes(identifier)) {
      pendingChanges.rerolled.push(identifier);
    }
  }

  markDirty();
  renderTable();
  createToast(`Key reroll staged for ${identifier} — click Save to commit`, "success");
}

// ── Render ───────────────────────────────────────────────────────────────────

function renderTable() {
  const tbody = document.getElementById('whitelistBody');
  tbody.innerHTML = "";

  const query = document.getElementById('searchInput').value.toLowerCase();
  const filterBy = document.getElementById('filterSelect').value;
  const filtered = stagedUsers.filter(u => {
    const v = u[filterBy] ? u[filterBy].toString().toLowerCase() : '';
    return v.includes(query);
  });

  const start = (currentPage - 1) * rowsPerPage;
  const end = start + rowsPerPage;

  filtered.slice(start, end).forEach(u => {
    const isDirtyRow =
      pendingChanges.added.some(a => a.Identifier === u.Identifier) ||
      !!pendingChanges.edited[u.Identifier] ||
      pendingChanges.rerolled.includes(u.Identifier);

    const dirtyIndicator = isDirtyRow
      ? `<span title="Unsaved change" style="color:#f59e0b;margin-right:4px">●</span>`
      : '';

    const tr = document.createElement('tr');
    tr.className = "border-t border-blue-700 hover:bg-[#64ffda11] transition-all";
    tr.innerHTML = `
      <td data-label="Identifier" class="p-3">${dirtyIndicator}${u.Identifier}</td>
      <td data-label="HWID" class="p-3">${u.HWID}</td>
      <td data-label="Discord ID" class="p-3">${u.DiscordId}</td>
      <td data-label="Rank" class="p-3">${u.Rank}</td>
      <td data-label="Join Date" class="p-3">${u.JoinDate}</td>
      <td data-label="Key" class="p-3">${u._pendingReroll ? '<em style="color:#f59e0b">Pending reroll</em>' : (u.Key || '')}</td>
      <td data-label="Notes" class="p-3">${u.Notes || ''}</td>
      <td data-label="Actions" class="p-3">
        <div class="flex flex-wrap justify-center gap-2">
          <button class="editBtn glow-btn bg-yellow-600 px-3 py-1 rounded hover:bg-yellow-500 text-white transition min-w-[80px]">Edit</button>
          <button class="removeBtn glow-btn bg-red-600 px-3 py-1 rounded hover:bg-red-500 text-white transition min-w-[80px]">Remove</button>
          <button class="rerollBtn glow-btn px-3 py-1 bg-yellow-600 hover:bg-yellow-500 text-white rounded-lg text-sm min-w-[80px]">Reroll Key</button>
        </div>
      </td>
    `;
    tbody.appendChild(tr);

    tr.querySelector('.editBtn').addEventListener('click', () => editUserObj(u));
    tr.querySelector('.removeBtn').addEventListener('click', () => removeUserObj(u));
    tr.querySelector('.rerollBtn').addEventListener('click', () => rerollUserKey(u.Identifier));
  });

  applyButtonGlows();
  renderPagination(filtered.length);
}

function renderPagination(totalItems) {
  const pagination = document.getElementById('pagination');
  pagination.innerHTML = "";
  const totalPages = Math.ceil(totalItems / rowsPerPage);
  for (let i = 1; i <= totalPages; i++) {
    const btn = document.createElement('button');
    btn.innerText = i;
    btn.className = `px-3 py-1 rounded ${i === currentPage ? 'bg-blue-600' : 'bg-blue-500'} text-white`;
    btn.onclick = () => { currentPage = i; renderTable(); };
    pagination.appendChild(btn);
  }
}

function applyButtonGlows() {
  document.querySelectorAll(".glow-btn").forEach(btn => {
    let bg = window.getComputedStyle(btn).backgroundColor;
    if (bg === "rgba(0, 0, 0, 0)" || bg === "transparent") {
      if (btn.classList.contains("bg-red-600"))    bg = "rgb(220, 38, 38)";
      else if (btn.classList.contains("bg-yellow-600")) bg = "rgb(202, 138, 4)";
      else if (btn.classList.contains("bg-blue-600"))   bg = "rgb(37, 99, 235)";
      else if (btn.classList.contains("bg-green-600"))  bg = "rgb(22, 163, 74)";
      else if (btn.classList.contains("bg-gray-600"))   bg = "rgb(75, 85, 99)";
      else bg = "rgb(100, 255, 218)";
    }
    function darkenRGB(rgb, amount = 0.7) {
      const nums = rgb.match(/\d+/g).map(Number);
      return `rgb(${Math.floor(nums[0]*amount)}, ${Math.floor(nums[1]*amount)}, ${Math.floor(nums[2]*amount)})`;
    }
    btn.style.setProperty("--glow-color", darkenRGB(bg));
  });
}

document.getElementById('searchInput').addEventListener('input', () => { currentPage = 1; renderTable(); });
document.getElementById('filterSelect').addEventListener('change', () => { currentPage = 1; renderTable(); });

function handleURLAction() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('action') === 'add') openAddModal();
}
document.addEventListener('DOMContentLoaded', handleURLAction);

fetchUsers();
</script>
{% endblock %}
