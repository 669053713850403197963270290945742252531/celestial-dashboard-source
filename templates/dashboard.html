{% extends "base.html" %}

{% block content %}
  <h2 class="text-3xl font-bold mb-6">Dashboard Overview</h2>

  <!-- Stats -->
  <div class="grid grid-cols-3 gap-6 mb-8">
    <div class="bg-blue-800/60 backdrop-blur shadow-lg rounded-xl p-6 border border-blue-700">
      <p class="text-gray-300">Total Whitelisted</p>
      <h3 class="text-3xl font-bold text-blue-300">123</h3>
    </div>
    <div class="bg-blue-800/60 backdrop-blur shadow-lg rounded-xl p-6 border border-blue-700">
      <p class="text-gray-300">Active Users</p>
      <h3 class="text-3xl font-bold text-green-300">87</h3>
    </div>
    <div class="bg-blue-800/60 backdrop-blur shadow-lg rounded-xl p-6 border border-blue-700">
      <p class="text-gray-300">Banned Users</p>
      <h3 class="text-3xl font-bold text-red-300">12</h3>
    </div>
  </div>

  <!-- Quick Actions -->
  <div class="grid grid-cols-2 gap-6">
    <div class="bg-blue-800/60 shadow-lg rounded-xl p-6 border border-blue-700">
      <h3 class="text-xl font-bold mb-4 text-blue-200">Whitelist User</h3>
      <form class="space-y-4">
        <input type="text" placeholder="Username" class="w-full p-3 border border-blue-600 rounded-lg bg-blue-950/50 text-white focus:outline-none focus:ring-2 focus:ring-blue-400">
        <input type="text" placeholder="Identifier (HWID, ID, etc.)" class="w-full p-3 border border-blue-600 rounded-lg bg-blue-950/50 text-white focus:outline-none focus:ring-2 focus:ring-blue-400">
        <button class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-500 transition">Add</button>
      </form>
    </div>
    <div class="bg-blue-800/60 shadow-lg rounded-xl p-6 border border-blue-700">
      <h3 class="text-xl font-bold mb-4 text-red-200">Unwhitelist User</h3>
      <form class="space-y-4">
        <input type="text" placeholder="Username or ID" class="w-full p-3 border border-blue-600 rounded-lg bg-blue-950/50 text-white focus:outline-none focus:ring-2 focus:ring-red-400">
        <button class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-500 transition">Remove</button>
      </form>
    </div>
  </div>
{% endblock %}
