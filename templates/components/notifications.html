<div id="notification-container" class="fixed top-4 right-4 flex flex-col space-y-2 z-50 pointer-events-none"></div>

<style>
/* ===== SCI-FI NEON NOTIFICATIONS ===== */
.notification {
  min-width: 250px;
  padding: 12px 16px;
  border-radius: 12px;
  font-weight: 500;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  opacity: 0;
  transform: translateX(30px);
  transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
  pointer-events: auto;
  color: #fff;
  font-family: 'Orbitron', sans-serif;
}

/* SHOW */
.notification.show {
  opacity: 1;
  transform: translateX(0);
}

/* NEON GLOW COLORS */
.notification.success {
  background: rgba(34,197,94,0.15);
  box-shadow:
    0 0 6px #22c55e77,
    0 0 12px #22c55e55,
    0 0 24px #22c55e33 inset,
    0 0 48px #22c55e22 inset;
  color: #2c9b55;
}
.notification.error {
  background: rgba(239,68,68,0.15);
  box-shadow:
    0 0 6px #ef444477,
    0 0 12px #ef444455,
    0 0 24px #ef444433 inset,
    0 0 48px #ef444422 inset;
  color: #ef4444;
}
.notification.info {
  background: rgba(59,130,246,0.15);
  box-shadow:
    0 0 6px #3b82f677,
    0 0 12px #3b82f655,
    0 0 24px #3b82f633 inset,
    0 0 48px #3b82f622 inset;
  color: #3b82f6;
}

/* PULSING GLOW */
@keyframes neonPulse {
  0%,100% { box-shadow: 0 0 6px currentColor, 0 0 12px currentColor, 0 0 24px currentColor inset, 0 0 48px currentColor inset; }
  50% { box-shadow: 0 0 12px currentColor, 0 0 24px currentColor, 0 0 36px currentColor inset, 0 0 72px currentColor inset; }
}
.notification.show {
  animation: neonPulse 1.2s infinite alternate;
}

/* ===== CONFIRM DIALOG ===== */
.notification.confirm {
  flex-direction: column;
  align-items: stretch;
  text-align: center;
  font-weight: bold;
  font-family: 'Orbitron', sans-serif;
  gap: 12px;
  background: rgba(0,0,0,0.4);
  box-shadow: 0 0 12px #64ffda88, 0 0 24px #64ffda55 inset, 0 0 48px #64ffda33 inset;
  color: #64ffda;
}
.notification.confirm div { margin-bottom: 8px; font-size: 1rem; }

.notification.confirm-buttons {
  display: flex;
  justify-content: center;
  gap: 12px;
}
.notification.confirm-buttons button {
  position: relative;
  padding: 6px 14px;
  border-radius: 8px;
  font-weight: 600;
  border: 1px solid rgba(255,255,255,0.2);
  cursor: pointer;
  transition: all 0.3s ease;
  color: white;
  font-family: 'Orbitron', sans-serif;
}
.notification.confirm-buttons button::before {
  content: '';
  position: absolute;
  top: -4px; left: -4px; right: -4px; bottom: -4px;
  border-radius: inherit;
  filter: blur(12px);
  opacity: 0;
  pointer-events: none;
  z-index: 0;
  transition: opacity 0.3s ease;
}
.notification.confirm-buttons button:hover::before { opacity: 0.6; }
.notification.confirm-buttons button:hover { transform: translateY(-2px) scale(1.05); }

.notification.confirm-buttons button.yes {
  background-color: #22c55e; border-color: #22c55e;
}
.notification.confirm-buttons button.yes::before { background-color: #22c55e; }
.notification.confirm-buttons button.no {
  background-color: #ef4444; border-color: #ef4444;
}
.notification.confirm-buttons button.no::before { background-color: #ef4444; }
</style>

<script>
const container = document.getElementById('notification-container');

window.notify = {
  show(message, type="info", duration=4000){
    const notif = document.createElement('div');
    notif.className = `notification ${type}`;
    notif.innerText = message;
    container.appendChild(notif);

    requestAnimationFrame(()=>notif.classList.add('show'));

    setTimeout(()=>{
      notif.classList.remove('show');
      // Ensure transition end fires
      requestAnimationFrame(()=>{
        notif.addEventListener('transitionend', ()=>notif.remove(), {once:true});
      });
    }, duration);
  },

  success(msg,duration=4000){ this.show(msg,"success",duration); },
  error(msg,duration=7000){ this.show(msg,"error",duration); },
  info(msg,duration=4000){ this.show(msg,"info",duration); },

  confirm(message){
    return new Promise(resolve=>{
      const notif = document.createElement('div');
      notif.className = 'notification confirm';

      const msgDiv = document.createElement('div');
      msgDiv.innerText = message;
      notif.appendChild(msgDiv);

      const btnContainer = document.createElement('div');
      btnContainer.className = 'notification confirm-buttons';

      const yesBtn = document.createElement('button');
      yesBtn.className='yes';
      yesBtn.innerText='Yes';

      const noBtn = document.createElement('button');
      noBtn.className='no';
      noBtn.innerText='No';

      btnContainer.appendChild(noBtn);
      btnContainer.appendChild(yesBtn);
      notif.appendChild(btnContainer);

      container.appendChild(notif);

      requestAnimationFrame(()=>notif.classList.add('show'));

      function closeConfirm(result){
        notif.classList.remove('show');
        // ensure animation/transition triggers
        requestAnimationFrame(()=>{
          notif.addEventListener('transitionend', ()=>notif.remove(), {once:true});
        });
        resolve(result);
      }

      yesBtn.onclick = () => closeConfirm(true);
      noBtn.onclick = () => closeConfirm(false);
    });
  }
};
</script>
