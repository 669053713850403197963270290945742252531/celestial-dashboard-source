<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ site_title }}</title>
  <link rel="icon" type="image/png" href="{{ site_icon }}">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/resources/styles/base.css">

<body class="bg-gradient-to-br from-[#030617] to-[#0a1a3a] text-white flex h-screen overflow-hidden">

  <!-- Mobile Top Bar -->
  <header class="lg:hidden w-full bg-blue-950/70 backdrop-blur-md p-4 flex justify-between items-center shadow-lg border-b border-blue-800">
    <div class="flex items-center space-x-3">
      <img src="{{ site_icon }}" alt="logo" class="w-6 h-6 rounded">
      <span class="font-semibold text-lg tracking-wide">{{ site_title }}</span>
    </div>
    <button onclick="toggleSidebar()" class="text-cyan-400 text-2xl focus:outline-none">☰</button>
  </header>

  <!-- Sidebar -->
  <aside id="sidebar"
    class="fixed lg:static inset-y-0 left-0 w-64 bg-gradient-to-b from-blue-950/80 to-indigo-950/80 backdrop-blur-md border-r border-blue-900 shadow-[0_0_25px_rgba(0,150,255,0.2)] text-white p-6 space-y-6 flex flex-col transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out z-50 animate-fadeZoomIn">
    
    <!-- Logo and Title -->
    <div class="flex items-center space-x-3">
      <img src="{{ site_icon }}" alt="logo" class="w-8 h-8 rounded shadow-[0_0_10px_rgba(0,200,255,0.5)]">
      <h1 class="text-xl font-bold tracking-wider text-cyan-300 drop-shadow-md">{{ site_title }}</h1>
    </div>

    <!-- Navigation -->
    <nav class="space-y-3 flex-1 mt-6 lg:mt-0">
      <a href="/dashboard"
        class="block px-4 py-3 rounded-lg glow-border transition-colors duration-200
                {% if request.path == '/dashboard' %}
                  bg-blue-600/60 text-white shadow-md
                {% else %}
                  bg-blue-900/40 hover:bg-blue-800/40 text-cyan-300
                {% endif %}">
        <span class="font-medium tracking-wide">Dashboard</span>
      </a>

      <a href="/users"
        class="block px-4 py-3 rounded-lg glow-border transition-colors duration-200
                {% if '/users' in request.path %}
                  bg-blue-600/60 text-white shadow-md
                {% else %}
                  bg-blue-900/40 hover:bg-blue-800/40 text-cyan-300
                {% endif %}">
        <span class="font-medium tracking-wide">User Management</span>
      </a>

      <a href="/whitelist"
        class="block px-4 py-3 rounded-lg glow-border transition-colors duration-200
                {% if '/whitelist' in request.path %}
                  bg-blue-600/60 text-white shadow-md
                {% else %}
                  bg-blue-900/40 hover:bg-blue-800/40 text-cyan-300
                {% endif %}">
        <span class="font-medium tracking-wide">Whitelist Management</span>
      </a>
    </nav>

    <!-- Sidebar Footer -->
    <div class="hidden lg:block text-xs text-gray-400 border-t border-blue-800/60 pt-4">
      <p class="text-center opacity-75">© 2025 Celestial Systems</p>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 p-6 lg:p-10 overflow-y-auto text-gray-100">
    {% block content %}
    {% endblock %}
  </main>

  <script>
  document.addEventListener("DOMContentLoaded", () => {
    if (/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
      document.documentElement.innerHTML = `
        <head>
          <link rel="stylesheet" href="/static/css/glitch.css">
        </head>
        <body style="background:white;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;overflow:hidden;">
          <div class="glitch-container" data-text="Device not supported.">Device not supported.</div>
        </body>
      `;
    }
  });
  </script>

  {% block head %}{% endblock %}
  {% include 'components/notifications.html' %}
</head>
<body>
